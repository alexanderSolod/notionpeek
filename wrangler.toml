# id = "<cache-kv-namespace-id>"
#
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "<rate-limit-kv-namespace-id>"
#
# [vars]
# ALLOWED_ORIGINS = "https://notionpeek.example.com,http://localhost:3000"
# ALLOW_LOCAL_ORIGINS = "false"
# REQUIRE_APP_REFERER = "true"
